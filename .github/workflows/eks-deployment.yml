name: EKS Cluster Deployments

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, destroy]

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0

jobs:
  deploy:
    name: Terraform Deploy
    runs-on: self-hosted
    if: github.event_name == 'push' || inputs.action == 'deploy'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Init and Apply
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="region=${{ env.AWS_REGION }}" \
            -var="cluster_name=eks-cluster" \
            -var="cluster_version=1.28" \
            -var="vpc_cidr=10.0.0.0/16" \
            -var="node_instance_type=t3.medium" \
            -var="desired_size=2" \
            -var="min_size=1" \
            -var="max_size=4" \
            -var="environment=dev"

  destroy:
    name: Terraform Destroy
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy
        run: |
          terraform init
          terraform destroy -auto-approve \
            -var="region=${{ env.AWS_REGION }}" \
            -var="cluster_name=eks-cluster" \
            -var="cluster_version=1.28" \
            -var="vpc_cidr=10.0.0.0/16" \
            -var="node_instance_type=t3.medium" \
            -var="desired_size=2" \
            -var="min_size=1" \
            -var="max_size=4" \
            -var="environment=dev"
